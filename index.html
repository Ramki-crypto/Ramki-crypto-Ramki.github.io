<!DOCTYPE html>
<html>
<head>
  <title>My Projects</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fa;
      text-align: center;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      width: 320px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-decoration: none;
      color: black;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .card h2 {
      margin: 0;
    }

    .card p {
      color: gray;
    }
  </style>
</head>

<body>

<header>
  <h1>My Projects 🚀</h1>
  <p>Click any project to view details</p>
</header>

<div class="container">

  <a href="project1.html" class="card">
    <h2>Project 1</h2>
    <p>Click to view details</p>
  </a>

  <a href="project2.html" class="card">
    <h2>Project 2</h2>
    <p>Click to view details</p>
  </a>

</div>

</body>
</html>
